skills:
  - name: grill-with-docs
    description: >
      Grill a codebase with questions about how something works, finding related
      code, or identifying patterns and anti-patterns in a codebase.
    source: vendored
    repo: https://github.com/mattpocock/skills
    ref: main
    subtree: skills/engineering/grill-with-docs
  - name: grill-me
    description: >
      Relentless interviewing skill that stress-tests plans and designs through
      systematic questioning.
    source: vendored
    repo: https://github.com/mattpocock/skills
    ref: main
    subtree: skills/productivity/grill-me
  - name: grilling
    description: >
      Interview me relentlessly about every aspect of this plan until we reach a
      shared understanding. Walk down each branch of the design tree, resolving
      dependencies between decisions one-by-one. For each question, provide your
      recommended answer.
    source: vendored
    repo: https://github.com/mattpocock/skills
    ref: main
    subtree: skills/productivity/grilling
  - name: to-spec
    description: >
      Turn the current conversation into a spec and publish it to the project
      issue tracker — no interview, just synthesis of what you've already
      discussed.
    source: vendored
    repo: https://github.com/mattpocock/skills
    ref: main
    subtree: skills/engineering/to-spec
  - name: improve-codebase-architecture
    description: >
      Analyze a codebase architecture and suggest improvements, refactors, and
      structural changes to improve maintainability, performance, and code
      quality.
    source: vendored
    repo: https://github.com/mattpocock/skills
    ref: main
    subtree: skills/engineering/improve-codebase-architecture
  - name: domain-modeling
    description: |
      Actively build and sharpen the project's domain model as you design.
    source: vendored
    repo: https://github.com/mattpocock/skills
    ref: main
    subtree: skills/engineering/domain-modeling
  - name: home-assistant-best-practices
    description: >
      Best practices for HA automations, helpers, scripts, device controls, and
      dashboards. Use when creating/editing automations, scripts, scenes,
      dashboards, helpers, Zigbee button/remote automations, entity renames, or
      Home Assistant dashboard cards.
    source: vendored
    repo: https://github.com/homeassistant-ai/skills
    ref: main
    subtree: skills/home-assistant-best-practices
  - name: impeccable
    description: >
      Use when designing, redesigning, shaping, critiquing, auditing, polishing,
      clarifying, hardening, optimizing, adapting, animating, colorizing,
      extracting, or otherwise improving a frontend interface.
    source: vendored
    repo: https://github.com/pbakaus/impeccable
    ref: main
    subtree: plugin/skills/impeccable
  - name: confluence-writer
    source: local
    skill: active/confluence-writer
    description: >
      Draft, refine, and sync Confluence pages as local markdown, then publish
      to Confluence on approval. Use when asked to write or update a Confluence
      page, turn a design or thread into a shareable doc, or publish a page for
      the team to read.
  - name: jira-writer
    source: local
    skill: active/jira-writer
    description: >
      Draft, refine, and sync Jira stories as local markdown, then push to Jira
      on approval. Use when asked to write or update a Jira story, turn notes or
      a bug into a ticket, or rewrite a story to read clearly.
  - name: mise
    source: local
    skill: active/mise
    description: >
      Use when answering mise basics: installing or adding global tools,
      choosing a mise backend, managing global mise environment variables,
      checking mise config, or giving concise mise command guidance.
  - name: agent-sessions
    source: local
    skill: active/agent-sessions
    description: >
      Use when doing session archaeology: finding, reading, reconstructing,
      catching up on, or auditing prior OpenCode or Claude Code sessions,
      including catching up on or resuming from a specific past session, tool
      calls, subagents, permission events, failures, skill usage, and local
      session stores.
  - name: agent-exec
    source: local
    skill: active/agent-exec
    description: >
      Run another agent harness via its CLI. Use when the user explicitly asks
      to run Codex, OpenCode, or Claude Code; continue a session from one of
      those harnesses; or inspect a harness's available models or variants.
  - name: herdr
    description: >
      Control Herdr from inside a Herdr-managed agent pane: inspect and
      coordinate panes, run commands without stealing focus, read output, wait
      for work to finish, and start helper agents.
    source: vendored
    repo: https://github.com/ogulcancelik/herdr
    ref: master
    subtree: SKILL.md
  - name: threads
    source: local
    skill: active/threads
    description: >
      Operate threads with the `mfz thread` CLI — load a thread's digest into
      context, or build and refresh one by discovering and ingesting sessions.
      Use when the user references an existing thread, wants to resume or catch
      up on a thread, or wants to ingest sessions into a thread. For catching up
      on a session (not a thread), use agent-sessions instead.
  - name: skill-writer
    description: >
      Create, synthesize, and iteratively improve agent skills following the
      Agent Skills specification. Use when asked to create, write, synthesize,
      improve, update, or maintain skill docs and registration.
    source: vendored
    repo: https://github.com/getsentry/skills
    ref: main
    subtree: skills/skill-writer
  - name: writing-great-skills
    description: >
      Reference for writing and editing skills well — the vocabulary and
      principles that make a skill predictable. Use when creating, editing, or
      pruning a skill, diagnosing why a skill feels verbose or ineffective, or
      deciding how to structure skill content.
    source: vendored
    repo: https://github.com/mattpocock/skills
    ref: main
    subtree: skills/productivity/writing-great-skills
  - name: skill-patterns
    source: local
    skill: active/skill-patterns
    description: >
      The rendered forms a well-written skill takes on the page — frontmatter
      shapes, opening lines, step-and-criterion blocks, glossary entries,
      composition moves, prose habits. Use when writing or reviewing a SKILL.md,
      when another skill needs the authoring forms, or alongside the
      writing-great-skills doctrine.
  - name: adversarial-code-review
    source: local
    skill: active/adversarial-code-review
    description: Adversarial code review — dispatch the current branch to a
      two-engine panel (Claude Opus + GPT-5.5), each running the thermo-nuclear
      review, then chair the merge into consensus/split findings. User-invoked.
  - name: quality-garden
    source: local
    skill: active/quality-garden
    description: >
      Quality garden - coordinate one behavior-preserving maintenance PR with
      separate gardener and reviewer roles. User-invoked.
  - name: closure-review
    source: local
    skill: active/closure-review
    description: >
      Closure review. Use after code-review findings have been implemented to
      verify every finding is closed and the remediation introduced no
      regressions.
  - name: hunk-review
    description: Interacts with live Hunk diff review sessions via CLI. Inspects
      review focus, navigates files and hunks, reloads session contents, and
      adds inline review comments. Use when the user has a Hunk session running
      or wants to review diffs interactively.
    source: vendored
    repo: https://github.com/modem-dev/hunk
    ref: main
    subtree: skills/hunk-review
  - name: thermo-nuclear-code-quality-review
    description: >
      Run an extremely strict maintainability review for abstraction quality,
      giant files, and spaghetti-condition growth. Use for a thermo-nuclear code
      quality review, thermonuclear review, deep code quality audit, or
      especially harsh maintainability review.
    source: vendored
    repo: https://github.com/cursor/plugins
    ref: main
    subtree: thermos/skills/thermo-nuclear-code-quality-review
  - name: openspec-apply-change
    source: local
    skill: openspec/openspec-apply-change
    description: >
      Implement tasks from an OpenSpec change. Use when starting implementation,
      continuing implementation, or working through tasks.
  - name: openspec-archive-change
    source: local
    skill: openspec/openspec-archive-change
    description: >
      Archive a completed change in the experimental workflow. Use when
      finalizing and archiving a change after implementation is complete.
  - name: openspec-explore
    source: local
    skill: openspec/openspec-explore
    description: >
      Enter explore mode — a thinking partner for exploring ideas, investigating
      problems, and clarifying requirements. Use when thinking through something
      before or during a change.
  - name: openspec-propose
    source: local
    skill: openspec/openspec-propose
    description: >
      Propose a new change with all artifacts generated in one step. Use when
      quickly describing what to build and getting a complete proposal with
      design, specs, and tasks ready for implementation.
  - name: openspec-update-change
    source: local
    skill: openspec/openspec-update-change
    description: >
      Revise an OpenSpec change's existing planning artifacts and keep them
      coherent without editing implementation code.
  - name: openspec-sync-specs
    source: local
    skill: openspec/openspec-sync-specs
    description: >
      Sync delta specs from a change to main specs. Use when updating main specs
      with changes from a delta spec, without archiving the change.
  - name: openspec-verify-change
    source: local
    skill: openspec/openspec-verify-change
    description: >
      Verify a change is ready for implementation. Use when checking if all
      required artifacts are complete and the change can proceed to
      implementation.
  - name: openspec-orchestrate
    source: local
    skill: openspec/openspec-orchestrate
    description: >
      Plan and coordinate an OpenSpec implementation as a standalone, plan-first
      workflow.
  - name: pr-writer
    source: local
    skill: active/pr-writer
    description: >
      Write or refresh a GitHub PR title and description, then create or update
      the PR with gh on approval. Use when opening a PR, writing or rewriting a
      PR title/body, or refreshing one after the branch changed.
  - name: qmd
    description: Search markdown knowledge bases, notes, and documentation using
      QMD. Use when users ask to search notes, find documents, or look up
      information.
    source: vendored
    repo: https://github.com/tobi/qmd
    ref: main
    subtree: skills/qmd
  - name: visual-explainer
    description: Generate beautiful, self-contained HTML pages that visually explain
      systems, code changes, plans, and data. Use when the user asks for a
      diagram, architecture overview, diff review, plan review, project recap,
      comparison table, or any visual explanation of technical concepts. Also
      use proactively when you are about to render a complex ASCII table (4+
      rows or 3+ columns) — present it as a styled HTML page instead.
    source: vendored
    repo: https://github.com/nicobailon/visual-explainer
    ref: main
    subtree: plugins/visual-explainer
  - name: openai-docs
    description: Use when the user asks how to build with OpenAI products or APIs
      and needs up-to-date official documentation with citations, help choosing
      the latest model for a use case, or model upgrade and prompt-upgrade
      guidance; prioritize OpenAI docs MCP tools, use bundled references only as
      helper context, and restrict any fallback browsing to official OpenAI
      domains.
    source: vendored
    repo: https://github.com/openai/skills
    ref: main
    subtree: skills/.curated/openai-docs
  - name: improve
    description: >
      Audit a codebase and write self-contained implementation plans for cheaper
      models to execute. Uses your most capable model for understanding,
      judging, and specifying — then hands off execution. Use for full audits,
      quick hotspot scans, focused category audits, branch-scoped PR reviews, or
      generating actionable specs.
    source: vendored
    repo: https://github.com/shadcn/improve
    ref: main
    subtree: skills/improve
  - name: audit-ai-writing
    source: local
    skill: active/audit-ai-writing
    description: >
      Audits prose for the tells of AI-generated writing — puffery, weasel
      attributions, negative parallelisms, the rule of three, AI vocabulary, and
      formatting tics. Use when asked to review or audit writing for AI signs,
      de-slop a draft, or strip ChatGPT-isms.
  - name: agent-browser
    description: >
      Fast browser automation CLI for AI agents with accessibility-tree
      snapshots, Chrome profile reuse, session persistence, and compact @eN
      element refs. Use when automating browser interactions, extracting data,
      filling forms, or testing web pages.
    source: vendored
    repo: https://github.com/vercel-labs/agent-browser
    ref: main
    subtree: skills/agent-browser
  - name: claude-code-docs
    source: local
    skill: active/claude-code-docs
    description: >
      Navigate and fetch Claude Code documentation. Use when answering questions
      about Claude Code features, configuration, capabilities, hooks, plugins,
      MCP servers, settings, CLI usage, deployment options, or troubleshooting.
  - name: skill-creator
    description: >
      Create and maintain reusable agent skills following the Anthropic skills
      framework. Use when writing or updating a skill package, shaping its
      instructions, or organizing skill assets.
    source: vendored
    repo: https://github.com/anthropics/skills
    ref: main
    subtree: skills/skill-creator
  - name: prototype
    description: >
      Build a throwaway prototype to flesh out a design — a runnable terminal
      app for state/business-logic questions, or several radically different UI
      variations toggleable from one route. Use when exploring a design through
      executable code before committing to an implementation.
    source: vendored
    repo: https://github.com/mattpocock/skills
    ref: main
    subtree: skills/engineering/prototype
  - name: handoff
    description: >
      Summarize conversations into handoff documents for seamless agent-to-agent
      transitions. Use when wrapping up a session and wanting to create a
      structured summary for a fresh agent to continue the work.
    source: vendored
    repo: https://github.com/mattpocock/skills
    ref: main
    subtree: skills/productivity/handoff
  - name: dataviz
    source: local
    skill: active/dataviz
    description: >
      Use this skill whenever you are about to create ANY chart, graph, plot,
      dashboard, or data visualization, in ANY output medium. Read it BEFORE
      writing chart code, choosing chart colors, building a stat tile / meter /
      KPI row, or laying out a dashboard. Teaches a design-system-agnostic
      method: a form heuristic, a color formula with a runnable validator, mark
      specs, and interaction rules, plus a validated default palette to swap for
      your brand.
