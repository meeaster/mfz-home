name: personal
extends: base
description: Personal AI setup with Home Assistant integrations.
instructions:
  - instructions/PERSONAL.md
thread:
  defaults:
    discover: claude-code:claude-sonnet-5@high
    gather: claude-code:haiku@low
    synthesize: claude-code:claude-sonnet-5@low
    digest: claude-code:claude-sonnet-5@high
agents: [opencode, claude-code, codex, pi]
references:
  - axis
  - clack
  - compound-engineering-plugin
  - openwiki
  - deepagents
  - vercel-ai
  - ha-mcp
extra_folders:
  - path: /tmp/compound-engineering
    description: Compound Engineering temporary scratch files for brainstorm grounding and repository profiles
  - path: /home/mark/.mindframe-z/stores/mindframe-z-specs
    description: Standalone OpenSpec store for Mindframe-Z change proposals, specifications, and task ledgers — needed when planning or implementing canonical home workspace changes
skills:
  home-assistant-best-practices:
    agents: { opencode: false, claude-code: false, codex: false }
mcp:
  homeassistant:
    agents: { opencode: false, claude-code: true, codex: false }
  openai-docs:
    agents: { opencode: false, claude-code: true, codex: false }
  pinescript-docs:
    agents: { opencode: false, claude-code: true, codex: false }
  aws-knowledge:
    agents: { opencode: false, claude-code: true, codex: false }
  x-docs:
    agents: { opencode: false, claude-code: true, codex: false }
  exa-research:
    agents: { opencode: false, claude-code: true, codex: false }
claude:
  settings:
    permissions:
      defaultMode: auto
opencode:
  plugins:
    - codex-identity
  config:
    permission:
      read:
        "~/.xurl": deny
      edit:
        "~/.xurl": deny
      bash:
        "*": allow
    agent:
      compaction:
        model: openai/gpt-5.6-terra
        variant: medium
  delegate_general:
    models:
      - id: openai/gpt-5.6-luna
        variants: [low, medium, high, xhigh, max]
        description: Fast, cost-efficient model for extraction, retrieval, summaries, mechanical checks, and lightweight agents; normally use low or medium for bounded non-coding work, high or xhigh as coding tradeoffs, and max only for quality-first Luna runs when the measured gain justifies the cost.
      - id: openai/gpt-5.6-terra
        variants: [low, medium, high, xhigh]
        description: Balanced model for everyday interactive and agentic work; normally use medium reasoning, or high for difficult bounded tasks.
      - id: openai/gpt-5.6-sol
        variants: [low, medium, high, xhigh]
        description: Frontier model for ambiguous synthesis, difficult reasoning, long-horizon work, and high-stakes review; normally use medium or higher reasoning.
